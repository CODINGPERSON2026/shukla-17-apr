<style>
    .army-no {
      font-weight: bold;
      color: #0d6efd;
    }
    
    .name-highlight {
      font-weight: 600;
      color: #198754;
    }
    
    #duesOutSearch {
      border-radius: 10px;
    }
    </style>
    <!-- ================= DUES OUT LIST MODAL ================= -->
<div class="modal fade" id="duesOutListModal" tabindex="-1">
    <div class="modal-dialog modal-xl modal-dialog-centered">
      <div class="modal-content">
  
        <!-- Header -->
        <div class="modal-header">
          <h5 class="modal-title fw-bold">DUES OUT DETAILS</h5>
          <button class="btn-close" data-bs-dismiss="modal"></button>
        </div>
  
        <!-- Body -->
        <div class="modal-body">
  
          <!-- 🔍 Search -->
          <input type="text" id="duesOutSearch" class="form-control mb-3" placeholder="Search Army No / Name...">
  
          <!-- 🔄 Loader -->
          <div id="duesOutLoader" class="text-center my-4">
            <div class="spinner-border text-primary"></div>
          </div>
  
          <!-- 📊 Table -->
          <div class="table-responsive">
            <table class="table table-bordered table-hover align-middle text-center d-none" id="duesOutTable">
              <thead class="table-dark">
                <tr>
                  <th>Army No</th>
                  <th>Rank</th>
                  <th>Name</th>
                  <th>Trade</th>
                  <th>Posted To</th>
                  <th>Dt of move</th>
                  <th>Posting Order No</th>
                  <th>Remarks</th>
                </tr>
              </thead>
              <tbody id="duesOutTableBody"></tbody>
            </table>
          </div>
  
        </div>
  
      </div>
    </div>
  </div>
  <script>
    let duesOutData = [];
    
    // 🚀 When modal opens → fetch data
    document.getElementById('duesOutListModal').addEventListener('show.bs.modal', async () => {
    
        document.getElementById("duesOutLoader").style.display = "block";
        document.getElementById("duesOutTable").classList.add("d-none");
    
        try {
            const res = await fetch("/dues/dues-out/list");
            const result = await res.json();
    
            if(result.success){
                duesOutData = result.data;
                renderTable(duesOutData);
            }
    
        } catch(err){
            console.error(err);
        }
    });
    function formatDate(dateStr){
        if(!dateStr) return '';
    
        const date = new Date(dateStr);
    
        return date.toLocaleDateString('en-GB', {
            day: '2-digit',
            month: 'short',
            year: 'numeric'
        });
    }
    // 📊 Render Table
    function renderTable(data){
        const tbody = document.getElementById("duesOutTableBody");
        tbody.innerHTML = "";
    
        if(data.length === 0){
            tbody.innerHTML = `<tr><td colspan="8">No Data Found</td></tr>`;
        }
    
        data.forEach(row => {
            tbody.innerHTML += `
                <tr>
                    <td class="army-no">${row.army_number || ''}</td>
                    <td>${row.rank || ''}</td>
                    <td class="name-highlight">${row.name || ''}</td>
                    <td>${row.trade || ''}</td>
                    <td>${row.posted_to || ''}</td>
                    <td>${formatDate(row.date_of_move)}</td>
                    <td>${row.posting_order_no || ''}</td>
                    <td>${row.remarks || ''}</td>
                </tr>
            `;
        });
    
        document.getElementById("duesOutLoader").style.display = "none";
        document.getElementById("duesOutTable").classList.remove("d-none");
    }
    
    // 🔍 Search (keyup)
    document.getElementById("duesOutSearch").addEventListener("keyup", function(){
        const value = this.value.toLowerCase();
    
        const filtered = duesOutData.filter(item =>
            (item.army_number || '').toLowerCase().includes(value) ||
            (item.name || '').toLowerCase().includes(value)
        );
    
        renderTable(filtered);
    });
    </script>
