<!-- ================= ADD DUES OUT MODAL ================= -->
<div class="modal fade" id="add_dues_out" tabindex="-1">
    <div class="modal-dialog modal-xl modal-dialog-centered">
      <div class="modal-content">
  
        <div class="modal-header">
          <h5 class="modal-title fw-bold">ADD DUES OUT</h5>
          <button class="btn-close" data-bs-dismiss="modal"></button>
        </div>
  
        <div class="modal-body">
  
          <form id="duesOutForm">
            <div class="row g-3">
  
              <div class="col-md-4">
                <label class="form-label">Army Number</label>
                <input type="text" class="form-control" name="army_number" required>
              </div>
  
              <div class="col-md-4">
                <label class="form-label">Rank</label>
                <input type="text" class="form-control" name="rank" required>
              </div>
  
              <div class="col-md-4">
                <label class="form-label">Trade</label>
                <input type="text" class="form-control" name="trade">
              </div>
  
              <div class="col-md-4">
                <label class="form-label">Name</label>
                <input type="text" class="form-control" name="name" required>
              </div>
  
              <div class="col-md-4">
                <label class="form-label">Posted To</label>
                <input type="text" class="form-control" name="posted_to">
              </div>
  
              <div class="col-md-4">
                <label class="form-label">Posting Order No</label>
                <input type="text" class="form-control" name="posting_order_no">
              </div>
  
              <div class="col-md-4">
                <label class="form-label">Date of Move</label>
                <input type="date" class="form-control" name="date_of_move">
              </div>
  
              <div class="col-md-12">
                <label class="form-label">Remarks</label>
                <textarea class="form-control" name="remarks"></textarea>
              </div>
  
            </div>
  
            <div class="mt-3 text-end">
              <button type="submit" class="btn btn-success">Save</button>
            </div>
  
          </form>
  
        </div>
  
      </div>
    </div>
  </div>

  <script>
    document.getElementById("duesOutForm").addEventListener("submit", async function(e){
        e.preventDefault();
    
        const formData = new FormData(this);
        const data = {};
    
        formData.forEach((value, key) => data[key] = value);
    
        try {
            const res = await fetch("/dues/out", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(data)
            });
    
            const result = await res.json();
    
            if(result.success){
                alert("Dues Out Saved Successfully!");
                location.reload();
            } else {
                alert("Error: " + result.message);
            }
    
        } catch(err){
            console.error(err);
            alert("Something went wrong");
        }
    });
    </script>
