<!-- ================= LEAVE DASHBOARD CLEAN ================= -->
<link rel="stylesheet" href="{{ url_for('static', filename='bootstrap/css/bootstrap.min.css') }}">
<script src="{{ url_for('static', filename='bootstrap/js/bootstrap.bundle.min.js') }}"></script>
<link rel="stylesheet" href="{{ url_for('static', filename='fontawesome-free-7.1.0-web/css/all.min.css') }}" />
<script src="/static/Chart.umd.min.js"></script>

<style>
  body {
    background: #f8fafc;
  }

  /* ===== HEADER ===== */
  .dashboard-header {
    background: #ffffff;
    padding: 18px 25px;
    border-radius: 14px;
    margin-bottom: 20px;
    border-left: 6px solid #2563eb;
    box-shadow: 0 5px 20px rgba(0,0,0,0.08);
  }

  .dashboard-header h4 {
    font-weight: 700;
    margin: 0;
    color: #1e293b;
  }

  /* ===== CARDS ===== */
  .dashboard-card {
    border-radius: 14px;
    padding: 1.2rem;
    background: #ffffff;
    box-shadow: 0 5px 20px rgba(0,0,0,0.08);
    transition: 0.25s;
  }

  .dashboard-card:hover {
    transform: translateY(-3px);
  }

  .dashboard-title {
    font-weight: 600;
    color: #334155;
  }

  /* ===== TABLE ===== */
  .table-expiring th {
    font-size: .75rem;
    text-transform: uppercase;
    color: #64748b;
  }

  .table-expiring td {
    color: #1e293b;
  }

  .badge-days {
    background: #fef3c7;
    color: #92400e;
    padding: .3rem .6rem;
    border-radius: 6px;
    font-weight: 600;
  }

  /* ===== TOTAL BADGE ===== */
  .total-badge {
    background: #2563eb;
    color: #fff;
    font-weight: 700;
    padding: 6px 14px;
    border-radius: 10px;
    font-size: 14px;
  }
</style>

<!-- ================= HEADER ================= -->
<div class="dashboard-header d-flex justify-content-between align-items-center">
  <h4>
    <i class="fa-solid fa-shield-halved me-2"></i>
    Leave Dashboard
  </h4>

  <span id="totalLeaveCount" class="total-badge">
    0 On Leave
  </span>
</div>

<div class="row mb-4">

  <!-- ================= LEFT: CHART ================= -->
  <div class="col-md-6">
    <div class="dashboard-card">
      <h6 class="dashboard-title mb-3">
        <i class="fa-solid fa-chart-column me-2"></i>
        Leave Distribution
      </h6>

      <canvas id="leaveChart" height="200"></canvas>
    </div>
  </div>

  <!-- ================= RIGHT: EXPIRING ================= -->
  <div class="col-md-6">
    <div class="dashboard-card">
      <h6 class="dashboard-title mb-3">
        <i class="fa-solid fa-clock me-2"></i>
        Leaves Expiring
      </h6>

      <div class="table-responsive">
        <table class="table table-hover table-expiring">
          <thead>
            <tr>
              <th>Army No</th>
              <th>Rank</th>
              <th>Name</th>
              <th>End Date</th>
              <th>Days Left</th>
            </tr>
          </thead>
          <tbody id="expiringTable">
            <tr>
              <td colspan="5" class="text-center text-muted">Loading...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

</div>

<script>
/* ================= CHART ================= */
let chartInstance = null;

async function loadLeaveChart() {
  try {
    const res = await fetch('/apply_leave/leave-type-stats');
    const data = await res.json();

    const labels = Object.keys(data);
    const values = Object.values(data);

    // TOTAL PEOPLE
    const total = values.reduce((a, b) => a + b, 0);
    document.getElementById("totalLeaveCount").innerText = `${total} On Leave`;

    const ctx = document.getElementById('leaveChart');

    if (chartInstance) {
      chartInstance.destroy();
    }

    chartInstance = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: labels,
        datasets: [{
          data: values,
          backgroundColor: '#2563eb', // single color
          borderRadius: 6,
          barThickness: 40
        }]
      },
      options: {
        animation: {
          duration: 800
        },
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: function(context) {
                const value = context.raw;
                const percent = total ? ((value / total) * 100).toFixed(1) : 0;
                return `${value} people (${percent}%)`;
              }
            }
          }
        },
        scales: {
          x: {
            ticks: {
              color: "#334155"
            },
            grid: {
              display: false
            }
          },
          y: {
            beginAtZero: true,
            ticks: {
              stepSize: 1,
              color: "#334155"
            },
            grid: {
              color: "rgba(0,0,0,0.05)"
            }
          }
        }
      }
    });

  } catch (err) {
    console.error("Chart load failed", err);
  }
}

/* ================= EXPIRING LEAVES ================= */
async function loadExpiringLeaves() {
  try {
    const res = await fetch('/apply_leave/expiring-soon');
    const data = await res.json();

    const tbody = document.getElementById('expiringTable');
    tbody.innerHTML = '';

    if (!data.length) {
      tbody.innerHTML = `
        <tr>
          <td colspan="5" class="text-center text-muted">No upcoming returns</td>
        </tr>`;
      return;
    }

    const today = new Date();

    data.forEach(p => {
      const end = new Date(p.leave_end_date);
      const diffDays = Math.ceil((end - today) / (1000 * 60 * 60 * 24));

      tbody.innerHTML += `
        <tr>
          <td>${p.army_number}</td>
          <td>${p.rank}</td>
          <td>${p.name}</td>
          <td>${p.leave_end_date}</td>
          <td><span class="badge-days">${diffDays} days</span></td>
        </tr>
      `;
    });

  } catch (err) {
    console.error("Expiring leave load failed", err);
  }
}

/* ================= INIT ================= */
document.addEventListener('DOMContentLoaded', () => {
  loadLeaveChart();
  loadExpiringLeaves();
});
</script>
